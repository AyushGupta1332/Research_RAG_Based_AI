{% extends "base.html" %}
{% block title %}Paper Detail — Research Agent{% endblock %}
{% block body %}
<div class="min-h-screen flex flex-col">
    <nav class="border-b border-white/5 backdrop-blur-xl bg-surface-950/80 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/dashboard" class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center shadow-lg shadow-brand-500/25">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    </div>
                    <span class="text-lg font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">Research Agent</span>
                </a>
                <div class="hidden md:flex items-center gap-1 text-sm">
                    <a href="/dashboard" class="px-3 py-1.5 text-gray-400 hover:text-white rounded-lg hover:bg-white/5 transition-all">Dashboard</a>
                    <a href="/papers" class="px-3 py-1.5 text-gray-400 hover:text-white rounded-lg hover:bg-white/5 transition-all">Papers</a>
                    <a href="/upload" class="px-3 py-1.5 text-gray-400 hover:text-white rounded-lg hover:bg-white/5 transition-all">Upload</a>
                    <a href="/research" class="px-3 py-1.5 text-gray-400 hover:text-white rounded-lg hover:bg-white/5 transition-all">Research</a>
                </div>
            </div>
            <button onclick="Auth.logout()" class="px-4 py-2 text-sm font-medium text-gray-400 hover:text-white border border-white/10 hover:border-white/20 rounded-lg transition-all">Sign Out</button>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-10">
        <div id="loading-state" class="flex items-center justify-center py-20">
            <svg class="w-8 h-8 text-brand-400 animate-spin" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        </div>

        <div id="paper-content" class="hidden">
            <!-- Header -->
            <div class="mb-8 animate-fade-in">
                <div class="flex items-start justify-between mb-4">
                    <a href="/papers" class="text-sm text-gray-400 hover:text-white flex items-center gap-1 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        Back to Papers
                    </a>
                    <div class="flex gap-2">
                        <button onclick="triggerExtraction()" id="extract-btn" class="px-4 py-2 text-sm font-medium text-brand-400 border border-brand-500/20 rounded-lg hover:bg-brand-500/10 transition-all flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                            Extract Knowledge
                        </button>
                        <button onclick="reprocessPaper()" class="px-4 py-2 text-sm font-medium text-gray-400 border border-white/10 rounded-lg hover:bg-white/5 transition-all">Reprocess</button>
                        <button onclick="deletePaper()" class="px-4 py-2 text-sm font-medium text-red-400 border border-red-500/20 rounded-lg hover:bg-red-500/10 transition-all">Delete</button>
                    </div>
                </div>
                <h1 id="paper-title" class="text-3xl font-bold text-white mb-3"></h1>
                <p id="paper-authors" class="text-gray-400 mb-4"></p>
                <div id="paper-meta" class="flex flex-wrap gap-4 text-sm text-gray-500"></div>
            </div>

            <!-- Abstract -->
            <div id="abstract-section" class="hidden mb-8 p-6 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
                <h2 class="text-lg font-semibold text-white mb-3">Abstract</h2>
                <p id="paper-abstract" class="text-sm text-gray-300 leading-relaxed"></p>
            </div>

            <!-- Tabs -->
            <div class="flex gap-2 mb-6 border-b border-white/5 pb-4">
                <button onclick="showTab('sections')" id="tab-sections" class="px-4 py-2 text-sm font-medium rounded-lg bg-white/10 text-white transition-all">Sections</button>
                <button onclick="showTab('chunks')" id="tab-chunks" class="px-4 py-2 text-sm font-medium rounded-lg text-gray-400 hover:bg-white/5 transition-all">Chunks</button>
                <button onclick="showTab('extraction')" id="tab-extraction" class="px-4 py-2 text-sm font-medium rounded-lg text-gray-400 hover:bg-white/5 transition-all">Extraction</button>
            </div>

            <div id="sections-tab" class="space-y-4"></div>
            <div id="chunks-tab" class="hidden space-y-3"></div>
            <div id="extraction-tab" class="hidden"></div>
        </div>
    </main>
</div>

<script>
if (!Auth.isAuthenticated()) window.location.href = '/login';
const paperId = {{ paper_id }};
let paperData = null;

async function loadPaper() {
    try {
        const data = await API.get('/papers/' + paperId);
        paperData = data.data.paper;
        renderPaper(paperData);
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('paper-content').classList.remove('hidden');
        if (paperData.status === 'processing' || paperData.status === 'uploaded') {
            setTimeout(loadPaper, 3000);
        }
    } catch (e) {
        document.getElementById('loading-state').innerHTML = '<p class="text-red-400">Paper not found or access denied.</p>';
    }
}

function renderPaper(p) {
    document.title = (p.title || p.file_name) + ' — Research Agent';
    document.getElementById('paper-title').textContent = p.title || p.file_name;
    document.getElementById('paper-authors').textContent = p.authors?.length ? p.authors.join(', ') : '';
    const sc = { uploaded:'bg-amber-500/10 text-amber-400', processing:'bg-blue-500/10 text-blue-400', completed:'bg-emerald-500/10 text-emerald-400', failed:'bg-red-500/10 text-red-400' };
    document.getElementById('paper-meta').innerHTML = `
        <span class="px-2.5 py-1 rounded-full text-xs font-medium ${sc[p.status] || ''}">${p.status}</span>
        <span>${p.page_count || '?'} pages</span><span>${p.section_count} sections</span><span>${p.chunk_count} chunks</span>
        <span>Uploaded ${new Date(p.upload_date).toLocaleDateString()}</span>
    `;
    if (p.abstract) {
        document.getElementById('abstract-section').classList.remove('hidden');
        document.getElementById('paper-abstract').textContent = p.abstract;
    }
    if (p.error_message) document.getElementById('paper-meta').innerHTML += `<span class="text-red-400">Error: ${p.error_message}</span>`;
    renderSections(p.sections || []);
}

function renderSections(sections) {
    const c = document.getElementById('sections-tab');
    if (!sections.length) { c.innerHTML = '<p class="text-gray-500 text-sm">No sections extracted yet.</p>'; return; }
    c.innerHTML = sections.map(s => `
        <div class="p-5 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-white font-medium">${s.section_name}</h3>
                <div class="flex items-center gap-3 text-xs text-gray-500">
                    <span>${s.chunk_count} chunks</span>
                    <span>Pages ${s.page_start}${s.page_end !== s.page_start ? '-'+s.page_end : ''}</span>
                    <span>${(s.content_length / 1000).toFixed(1)}k chars</span>
                </div>
            </div>
        </div>
    `).join('');
}

async function loadChunks() {
    const c = document.getElementById('chunks-tab');
    c.innerHTML = '<p class="text-gray-500 text-sm">Loading chunks...</p>';
    try {
        const data = await API.get('/papers/' + paperId + '/chunks?per_page=100');
        const chunks = data.data.chunks;
        if (!chunks.length) { c.innerHTML = '<p class="text-gray-500 text-sm">No chunks generated yet.</p>'; return; }
        c.innerHTML = chunks.map(ch => `
            <div class="p-4 rounded-xl bg-white/[0.03] border border-white/[0.06]">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-medium text-brand-400">Chunk #${ch.chunk_index}</span>
                    <div class="flex items-center gap-3 text-xs text-gray-500">
                        <span>${ch.section_name || 'N/A'}</span><span>${ch.token_count} tokens</span><span>Page ${ch.page || '?'}</span>
                    </div>
                </div>
                <p class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">${ch.text.length > 500 ? ch.text.substring(0,500)+'...' : ch.text}</p>
            </div>
        `).join('');
    } catch (e) { c.innerHTML = '<p class="text-red-400 text-sm">Failed to load chunks.</p>'; }
}

async function loadExtraction() {
    const c = document.getElementById('extraction-tab');
    c.innerHTML = '<p class="text-gray-500 text-sm">Loading extraction data...</p>';
    try {
        const data = await API.get('/papers/' + paperId + '/extraction');
        if (!data.data.has_extraction) {
            c.innerHTML = `<div class="text-center py-16"><div class="w-16 h-16 rounded-2xl bg-brand-500/10 flex items-center justify-center mx-auto mb-4"><svg class="w-8 h-8 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg></div><h3 class="text-lg font-semibold text-white mb-2">No extraction yet</h3><p class="text-gray-400 text-sm mb-6">Click "Extract Knowledge" to analyze this paper with AI.</p><button onclick="triggerExtraction()" class="px-6 py-2.5 bg-gradient-to-r from-brand-600 to-brand-500 text-white font-medium rounded-xl">Extract Now</button></div>`;
            return;
        }
        const ext = data.data.extraction;
        if (ext.status === 'processing') {
            c.innerHTML = '<div class="text-center py-16"><svg class="w-8 h-8 text-brand-400 animate-spin mx-auto mb-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><p class="text-gray-400">Extracting knowledge with AI...</p></div>';
            setTimeout(() => { if(document.getElementById('extraction-tab').classList.contains('hidden')===false) loadExtraction(); }, 4000);
            return;
        }
        if (ext.status === 'failed') {
            c.innerHTML = `<div class="p-6 rounded-2xl bg-red-500/5 border border-red-500/20"><p class="text-red-400 mb-2">Extraction failed</p><p class="text-sm text-gray-400">${ext.error_message||'Unknown error'}</p><button onclick="triggerExtraction()" class="mt-4 px-4 py-2 text-sm text-brand-400 border border-brand-500/20 rounded-lg hover:bg-brand-500/10">Retry</button></div>`;
            return;
        }
        renderExtraction(ext);
    } catch (e) { c.innerHTML = '<p class="text-red-400 text-sm">Failed to load extraction.</p>'; }
}

function renderExtraction(ext) {
    const d = ext.extracted_data || {};
    const s = ext.summary_data || {};
    const c = document.getElementById('extraction-tab');

    let html = '';
    // Meta bar
    html += `<div class="mb-6 px-5 py-3 rounded-xl bg-white/[0.02] border border-white/[0.06] flex items-center justify-between text-sm">
        <div class="flex items-center gap-4 text-gray-400"><span class="text-emerald-400 font-medium">Extraction Complete</span><span>•</span><span>${ext.llm_model||'—'}</span><span>•</span><span>${ext.total_tokens||0} tokens</span><span>•</span><span>${Math.round(ext.latency_ms||0)}ms</span></div>
        <div class="flex items-center gap-2"><span class="text-xs text-gray-500">Confidence:</span><span class="text-sm font-bold ${(ext.confidence_score||0)>0.7?'text-emerald-400':(ext.confidence_score||0)>0.4?'text-amber-400':'text-red-400'}">${((ext.confidence_score||0)*100).toFixed(0)}%</span></div>
    </div>`;

    // Summary
    if (s.one_line_summary || s.detailed_summary) {
        html += `<div class="mb-6 p-6 rounded-2xl bg-gradient-to-br from-brand-500/5 to-purple-500/5 border border-brand-500/10">
            <h3 class="text-lg font-semibold text-white mb-3">AI Summary</h3>
            ${s.one_line_summary ? `<p class="text-brand-300 font-medium mb-3">${esc(s.one_line_summary)}</p>` : ''}
            ${s.detailed_summary ? `<p class="text-sm text-gray-300 leading-relaxed">${esc(s.detailed_summary)}</p>` : ''}
            ${s.key_contributions?.length ? `<div class="mt-4"><h4 class="text-xs font-medium text-gray-400 mb-2">KEY CONTRIBUTIONS</h4><ul class="space-y-1">${s.key_contributions.map(c=>`<li class="text-sm text-gray-300 flex items-start gap-2"><span class="text-brand-400 mt-1">•</span>${esc(c)}</li>`).join('')}</ul></div>` : ''}
        </div>`;
    }

    // Grid sections
    const gridItems = [];
    if (d.research_domain) gridItems.push({label:'Domain', value:d.research_domain, color:'purple'});
    if (d.paper_type) gridItems.push({label:'Type', value:d.paper_type, color:'blue'});
    if (d.references_count) gridItems.push({label:'References', value:d.references_count, color:'gray'});

    if (gridItems.length) {
        html += `<div class="grid grid-cols-3 gap-4 mb-6">${gridItems.map(i=>`<div class="p-4 rounded-xl bg-white/[0.03] border border-white/[0.04]"><div class="text-xs text-gray-500 mb-1">${i.label}</div><div class="text-sm font-medium text-white capitalize">${esc(String(i.value))}</div></div>`).join('')}</div>`;
    }

    // Methods
    if (d.methods?.length) {
        html += `<div class="mb-6 p-6 rounded-2xl bg-white/[0.03] border border-white/[0.06]"><h3 class="text-lg font-semibold text-white mb-3">Methods</h3><div class="space-y-3">${d.methods.map(m=>`<div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]"><div class="flex items-center gap-2 mb-1"><span class="text-sm font-medium text-white">${esc(m.name||'')}</span>${m.is_novel?'<span class="text-xs px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Novel</span>':''}</div><p class="text-xs text-gray-400">${esc(m.description||'')}</p></div>`).join('')}</div></div>`;
    }

    // Metrics
    if (d.metrics?.length) {
        html += `<div class="mb-6 p-6 rounded-2xl bg-white/[0.03] border border-white/[0.06]"><h3 class="text-lg font-semibold text-white mb-3">Metrics & Results</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-500 border-b border-white/5"><th class="pb-2 pr-4">Metric</th><th class="pb-2 pr-4">Value</th><th class="pb-2 pr-4">Dataset</th><th class="pb-2">Comparison</th></tr></thead><tbody>${d.metrics.map(m=>`<tr class="border-b border-white/[0.03]"><td class="py-2 pr-4 text-white">${esc(m.name||'')}</td><td class="py-2 pr-4 font-mono text-emerald-400">${esc(m.value||'')}</td><td class="py-2 pr-4 text-gray-400">${esc(m.dataset||'—')}</td><td class="py-2 text-gray-400">${esc(m.baseline_comparison||'—')}</td></tr>`).join('')}</tbody></table></div></div>`;
    }

    // Datasets & Architectures
    if (d.datasets?.length) {
        html += `<div class="mb-6 p-6 rounded-2xl bg-white/[0.03] border border-white/[0.06]"><h3 class="text-lg font-semibold text-white mb-3">Datasets</h3><div class="flex flex-wrap gap-2">${d.datasets.map(ds=>`<span class="px-3 py-1.5 rounded-lg bg-blue-500/10 text-blue-300 text-sm border border-blue-500/20">${esc(ds.name||ds)}</span>`).join('')}</div></div>`;
    }
    if (d.architectures?.length) {
        html += `<div class="mb-6 p-6 rounded-2xl bg-white/[0.03] border border-white/[0.06]"><h3 class="text-lg font-semibold text-white mb-3">Architectures</h3><div class="space-y-2">${d.architectures.map(a=>`<div class="p-3 rounded-xl bg-white/[0.02] border border-white/[0.04]"><span class="text-sm font-medium text-white">${esc(a.name||'')}</span> <span class="text-xs text-gray-500">${esc(a.type||'')}</span><p class="text-xs text-gray-400 mt-1">${esc(a.description||'')}</p></div>`).join('')}</div></div>`;
    }

    // Findings, Limitations, Future Work
    const listSections = [
        {key:'key_findings', title:'Key Findings', color:'emerald'},
        {key:'limitations', title:'Limitations', color:'amber'},
        {key:'future_work', title:'Future Work', color:'purple'}
    ];
    for (const ls of listSections) {
        if (d[ls.key]?.length) {
            html += `<div class="mb-6 p-6 rounded-2xl bg-white/[0.03] border border-white/[0.06]"><h3 class="text-lg font-semibold text-white mb-3">${ls.title}</h3><ul class="space-y-2">${d[ls.key].map(item=>`<li class="text-sm text-gray-300 flex items-start gap-2"><span class="text-${ls.color}-400 mt-0.5">•</span>${esc(item)}</li>`).join('')}</ul></div>`;
        }
    }

    c.innerHTML = html;
}

function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function showTab(tab) {
    ['sections','chunks','extraction'].forEach(t => {
        document.getElementById('tab-'+t).className = 'px-4 py-2 text-sm font-medium rounded-lg ' + (tab===t?'bg-white/10 text-white':'text-gray-400 hover:bg-white/5') + ' transition-all';
        document.getElementById(t+'-tab').classList.toggle('hidden', tab!==t);
    });
    if (tab==='chunks') loadChunks();
    if (tab==='extraction') loadExtraction();
}

async function triggerExtraction() {
    try {
        await API.post('/papers/' + paperId + '/extract');
        showToast('Extraction started — AI is analyzing the paper...', 'info');
        showTab('extraction');
    } catch (e) { showToast(e.message || 'Extraction failed', 'error'); }
}

async function reprocessPaper() {
    if (!confirm('This will clear existing sections and chunks. Continue?')) return;
    try { await API.post('/papers/'+paperId+'/reprocess'); showToast('Reprocessing started','info'); setTimeout(loadPaper,1000); } catch(e) { showToast('Reprocessing failed','error'); }
}

async function deletePaper() {
    if (!confirm('Delete this paper permanently? This cannot be undone.')) return;
    try { await API.delete('/papers/'+paperId); showToast('Paper deleted','success'); setTimeout(()=>window.location.href='/papers',500); } catch(e) { showToast('Delete failed','error'); }
}

function showToast(msg, type='info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const colors = {info:'border-brand-500/40 bg-brand-500/10 text-brand-200', error:'border-red-500/40 bg-red-500/10 text-red-200', success:'border-emerald-500/40 bg-emerald-500/10 text-emerald-200'};
    toast.className = `px-5 py-3 rounded-xl border backdrop-blur-xl text-sm animate-slide-up ${colors[type]||colors.info}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
}

document.addEventListener('DOMContentLoaded', loadPaper);
</script>
{% endblock %}
